# ======================================================
# AutoMSG Global Configuration
# ======================================================
# 
# [ LANGUAGE ]
# Set the language for all system messages.
# Available: en, pt, es, ru

Settings:
  Language: pt


# [ SOUND ]
# Sound settings were moved to each category file!
# You can now have different sounds for Tips, Votes, etc.
# 
# [ COMMANDS & PERMISSIONS ]
# Permission: automsg.admin
# 
# /am reload              - Reloads all files and timers.
# /am list <category>     - Lists messages with IDs from a file.
# /am add <cat> <msg>     - Adds a new announcement to a file.
# /am remove <cat> <id>   - Deletes an announcement by ID.
# 
# [ CATEGORIES ]
# The plugin manages messages in separate files.
# You must edit the announcements inside these files:
# - votes.yml   (Vote sites and links)
# - tips.yml    (Server tips and gameplay help)
# - links.yml   (Discord, Store, and Social Media)
# - rules.yml   (Server rules and behavior)
# - motd.yml    (Welcome messages)
# - other.yml   (Generic announcements)
#
# IMPORTANT: Each file has its own 'Enabled' toggle and 'Interval'.
# ======================================================
